name: Update Courses Daily

on:
  schedule:
    - cron: "0 6 * * *"   # 6:00 AM UTC every day
  workflow_dispatch:        # run manually from GitHub → Actions tab

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      # Pure scraper — no API key needed, zero cost
      - name: Run scraper
        run: python scraper/scraper.py

      - name: Commit if courses.json changed
        run: |
          git config user.name  "courses-bot"
          git config user.email "bot@rooteddreams.net"
          git add data/courses.json
          git diff --cached --quiet || \
            git commit -m "data: update courses $(date '+%Y-%m-%d')"

      - name: Push
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main
