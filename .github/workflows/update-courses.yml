name: Update Courses Daily

on:
  schedule:
    - cron: "0 6 * * *"   # 6:00 AM UTC every day
  workflow_dispatch:        # run manually: Actions tab → Run workflow

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r free-courses-tracker/scraper/requirements.txt

      # Step 1 — scrape all sources, update courses.json
      - name: Run scraper
        run: python free-courses-tracker/scraper/scraper.py

      # Step 2 — inject courses.json into index.html (no fetch on page load)
      - name: Build index.html
        run: python free-courses-tracker/scraper/build.py

      # Step 3 — commit both files if anything changed
      - name: Commit changes
        run: |
          git config user.name  "courses-bot"
          git config user.email "bot@rooteddreams.net"
          git add free-courses-tracker/data/courses.json free-courses-tracker/index.html
          git diff --cached --quiet || \
            git commit -m "data: update courses $(date '+%Y-%m-%d')"

      - name: Push
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main
